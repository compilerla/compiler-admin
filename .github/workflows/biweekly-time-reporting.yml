name: Bi-Weekly Time Reporting
description: Posts a time report from Toggl to Slack of all billable time in the date range (defaults to prior 2 weeks).

on:
  schedule:
    - cron: "0 15 * * 3" # Every Wednesday at 15:00 UTC (8:00 AM PDT / 7:00 AM PST)
  workflow_dispatch:
    inputs:
      start-date:
        description: "Start date for the report period (YYYY-MM-DD)"
        required: false
      end-date:
        description: "End date for the report period (YYYY-MM-DD)"
        required: false

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            # We want to run every 2 weeks on odd ISO weeks
            if (( $(date +%V) % 2 != 0 )); then
              echo "should-run=true" >> $GITHUB_OUTPUT
            else
              echo "should-run=false" >> $GITHUB_OUTPUT
            fi
          else
            # not a scheduled run, so run it!
            echo "should-run=true" >> $GITHUB_OUTPUT
          fi

  time-reporting:
    needs: check-schedule
    if: needs.check-schedule.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .github/workflows/.python-version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download Toggl time entries
        id: download
        env:
          TOGGL_API_TOKEN: "${{ secrets.TOGGL_API_TOKEN }}"
          TOGGL_USER_AGENT: "compilerla/compiler-admin"
          TOGGL_WORKSPACE_ID: "${{ secrets.TOGGL_WORKSPACE_ID }}"
        run: |
          START_DATE="${{ github.event.inputs.start-date }}"
          END_DATE="${{ github.event.inputs.end-date }}"

          if [[ -z "$START_DATE" && -z "$END_DATE" ]]; then
            END_DATE=$(date -d "yesterday" +%Y-%m-%d)
            START_DATE=$(date -d "$END_DATE - 13 days" +%Y-%m-%d)
          elif [[ -n "$START_DATE" && -z "$END_DATE" ]]; then
            END_DATE=$(date -d "$START_DATE + 13 days" +%Y-%m-%d)
          elif [[ -z "$START_DATE" && -n "$END_DATE" ]]; then
            START_DATE=$(date -d "$END_DATE - 13 days" +%Y-%m-%d)
          fi

          ARGS="--start=$START_DATE --end=$END_DATE"

          OUTPUT=$(compiler-admin time download $ARGS)
          echo "$OUTPUT"

          FILENAME=$(echo "$OUTPUT" | grep "Download complete:" | cut -d' ' -f3)
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT
          echo "start_date=$START_DATE" >> $GITHUB_OUTPUT
          echo "end_date=$END_DATE" >> $GITHUB_OUTPUT

      - name: Summarize
        id: summarize
        run: |
          START_DATE="${{ steps.download.outputs.start_date }}"
          END_DATE="${{ steps.download.outputs.end_date }}"
          echo "summary=Billable time report for $START_DATE to $END_DATE" >> $GITHUB_OUTPUT

      - name: Post to Slack
        id: slack
        if: success()
        uses: slackapi/slack-github-action@v4.0.0
        with:
          method: files.uploadV2
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel_id: ${{ secrets.SLACK_CHANNEL_ID }}
            initial_comment: "${{ steps.summarize.outputs.summary }}"
            file: ${{ steps.download.outputs.filename }}
            filename: ${{ steps.download.outputs.filename }}

      - name: Cleanup
        id: cleanup
        if: always()
        run: |
          FILENAME="${{ steps.download.outputs.filename }}"
          rm -f "$FILENAME"
